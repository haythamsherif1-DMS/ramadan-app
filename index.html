<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مواقيت الصلاة - Golden Light</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#0f2a4a">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-blue: #0f2a4a; /* مستوحى من اللوجو */
            --gold-accent: #d4af37; /* اللون الذهبي في اللوجو */
            --glass-bg: rgba(255, 255, 255, 0.1);
        }

        body {
            margin: 0;
            font-family: 'Cairo', sans-serif;
            background: radial-gradient(circle, #1a3a5f 0%, #0a1a2e 100%);
            color: #fff;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .app {
            width: 90%;
            max-width: 400px;
            background: var(--glass-bg);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(212, 175, 55, 0.3);
            border-radius: 30px;
            overflow: hidden;
            box-shadow: 0 25px 50px rgba(0,0,0,0.5);
            text-align: center;
        }

        .header {
            padding: 30px 20px;
            background: rgba(15, 42, 74, 0.6);
        }

        .logo-container img {
            width: 120px;
            border-radius: 50%;
            border: 2px solid var(--gold-accent);
            margin-bottom: 15px;
        }

        .countdown {
            font-size: 2.8rem;
            color: var(--gold-accent);
            font-weight: 800;
            margin: 10px 0;
            text-shadow: 0 0 10px rgba(212, 175, 55, 0.5);
        }

        .list { padding: 20px; }

        .card {
            display: flex;
            justify-content: space-between;
            padding: 15px 20px;
            margin-bottom: 12px;
            background: rgba(255, 255, 255, 0.08);
            border-radius: 15px;
            border-right: 4px solid transparent;
            transition: 0.3s;
        }

        .card.active {
            background: rgba(212, 175, 55, 0.2);
            border-right-color: var(--gold-accent);
            transform: scale(1.05);
        }

        .btn-activate {
            background: var(--gold-accent);
            color: var(--primary-blue);
            border: none;
            padding: 10px 20px;
            border-radius: 50px;
            font-weight: bold;
            cursor: pointer;
            margin-bottom: 15px;
        }
    </style>
</head>
<body>

<div class="app">
    <div class="header">
        <div class="logo-container">
            <img src="icon.png" alt="Logo">
        </div>
        <button class="btn-activate" onclick="enableAudio()">تفعيل الأذان والاهتزاز 🔔</button>
        <div id="nextPrayer" style="color: var(--gold-accent); font-weight: bold;">جاري التحميل...</div>
        <div class="countdown" id="countdown">00:00:00</div>
    </div>

    <div class="list" id="prayerList"></div>
    <div id="status" style="font-size: 0.8rem; opacity: 0.6; padding-bottom: 15px;">المصدر: الهيئة المصرية للمساحة</div>
</div>

<audio id="adhanAudio" src="adhan.mp3"></audio>

<script>
    let timings = {};
    const names = { Fajr: "الفجر", Sunrise: "الشروق", Dhuhr: "الظهر", Asr: "العصر", Maghrib: "المغرب", Isha: "العشاء" };

    function enableAudio() {
        const adhan = document.getElementById("adhanAudio");
        adhan.play().then(() => { adhan.pause(); adhan.currentTime = 0; });
        if ("Notification" in window) Notification.requestPermission();
        alert("تم تفعيل التنبيهات بنجاح!");
    }

    async function loadTimes() {
        // تم ضبط الطريقة 5 (مصر) والمدينة القاهرة
        const res = await fetch(`https://api.aladhan.com/v1/timingsByCity?city=Cairo&country=Egypt&method=5`);
        const data = await res.json();
        timings = data.data.timings;
        renderPrayers();
        setInterval(updateCountdown, 1000);
    }

    function renderPrayers() {
        const container = document.getElementById("prayerList");
        container.innerHTML = "";
        Object.keys(names).forEach(key => {
            container.innerHTML += `
                <div class="card" id="card-${key}">
                    <span style="font-weight: bold;">${names[key]}</span>
                    <span>${timings[key]}</span>
                </div>`;
        });
    }

    function updateCountdown() {
        const now = new Date();
        let minDiff = Infinity;
        let upcoming = "";

        Object.keys(names).forEach(key => {
            const [hrs, mins] = timings[key].split(":");
            let pDate = new Date();
            pDate.setHours(hrs, mins, 0);
            if (pDate < now) pDate.setDate(pDate.getDate() + 1);
            const diff = pDate - now;
            if (diff < minDiff) { minDiff = diff; upcoming = key; }
            document.getElementById(`card-${key}`).classList.remove("active");
        });

        document.getElementById(`card-${upcoming}`).classList.add("active");
        document.getElementById("nextPrayer").innerText = "الصلاة القادمة: " + names[upcoming];

        const h = Math.floor(minDiff / 3600000);
        const m = Math.floor((minDiff % 3600000) / 60000);
        const s = Math.floor((minDiff % 60000) / 1000);
        document.getElementById("countdown").innerText = `${h.toString().padStart(2,"0")}:${m.toString().padStart(2,"0")}:${s.toString().padStart(2,"0")}`;

        if (h === 0 && m === 0 && s === 0) {
            document.getElementById("adhanAudio").play();
            if ("vibrate" in navigator) navigator.vibrate([1000, 500, 1000]);
        }
    }

    if ("serviceWorker" in navigator) navigator.serviceWorker.register("service-worker.js");
    loadTimes();
</script>
</body>
</html>
