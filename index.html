<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مواقيت الصلاة - Golden Light v1.1</title>
    
    <link rel="manifest" href="manifest.json?v=1.1">
    <meta name="theme-color" content="#0f2a4a">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary-blue: #0f2a4a;
            --gold-accent: #d4af37;
            --glass-bg: rgba(255, 255, 255, 0.1);
        }

        body {
            margin: 0;
            font-family: 'Cairo', sans-serif;
            background: radial-gradient(circle, #1a3a5f 0%, #0a1a2e 100%);
            color: #fff;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px 0;
        }

        .app {
            width: 90%;
            max-width: 400px;
            background: var(--glass-bg);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(212, 175, 55, 0.3);
            border-radius: 30px;
            overflow: hidden;
            box-shadow: 0 25px 50px rgba(0,0,0,0.5);
            text-align: center;
        }

        .header {
            padding: 30px 20px;
            background: rgba(15, 42, 74, 0.6);
        }

        .logo-container img {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            border: 2px solid var(--gold-accent);
            margin-bottom: 15px;
            object-fit: cover;
        }

        .countdown {
            font-size: 2.5rem;
            color: var(--gold-accent);
            font-weight: 800;
            margin: 10px 0;
            text-shadow: 0 0 10px rgba(212, 175, 55, 0.5);
        }

        .list { padding: 15px; }

        .card {
            display: flex;
            justify-content: space-between;
            padding: 12px 20px;
            margin-bottom: 10px;
            background: rgba(255, 255, 255, 0.08);
            border-radius: 15px;
            border-right: 4px solid transparent;
            transition: 0.3s;
        }

        .card.active {
            background: rgba(212, 175, 55, 0.2);
            border-right-color: var(--gold-accent);
            transform: scale(1.02);
        }

        .hadith-section {
            margin: 15px;
            padding: 15px;
            background: rgba(0, 0, 0, 0.2);
            border-radius: 15px;
            border: 1px dashed var(--gold-accent);
        }

        .hadith-title {
            color: var(--gold-accent);
            font-size: 0.9rem;
            font-weight: 800;
            margin-bottom: 8px;
            display: block;
        }

        #hadithText {
            font-size: 0.85rem;
            line-height: 1.6;
            color: #efefef;
            font-style: italic;
        }

        .btn-activate {
            background: var(--gold-accent);
            color: var(--primary-blue);
            border: none;
            padding: 10px 20px;
            border-radius: 50px;
            font-weight: bold;
            cursor: pointer;
            margin-bottom: 15px;
            font-family: 'Cairo';
        }

        .version-tag {
            font-size: 0.6rem;
            opacity: 0.4;
            padding-bottom: 10px;
        }
    </style>
</head>
<body>

<div class="app">
    <div class="header">
        <div class="logo-container">
            <img src="icon.png" alt="Logo">
        </div>
        <button class="btn-activate" onclick="enableAudio()">تفعيل التنبيهات 🔔</button>
        <div id="nextPrayer" style="color: var(--gold-accent); font-weight: bold; font-size: 1.1rem;">جاري التحميل...</div>
        <div class="countdown" id="countdown">00:00:00</div>
    </div>

    <div class="list" id="prayerList"></div>

    <div class="hadith-section">
        <span class="hadith-title">✨ حديث اليوم</span>
        <div id="hadithText">جاري تحميل الحديث النبوي...</div>
    </div>

    <div id="status" style="font-size: 0.7rem; opacity: 0.5;">المصدر: الهيئة المصرية للمساحة</div>
    <div class="version-tag" id="appVersionDisplay"></div>
</div>

<audio id="adhanAudio" src="adhan.mp3"></audio>

<script>
    // --- متغير الإصدار الرئيسي ---
    const APP_VERSION = "1.1"; // قم بتغيير هذا الرقم فقط عند كل تحديث
    
    document.getElementById("appVersionDisplay").innerText = "Version " + APP_VERSION;

    let timings = {};
    const names = { Fajr: "الفجر", Sunrise: "الشروق", Dhuhr: "الظهر", Asr: "العصر", Maghrib: "المغرب", Isha: "العشاء" };
    
    const hadiths = [
        "«خياركم من تعلم القرآن وعلمه»",
        "«إنما الأعمال بالنيات، وإنما لكل امرئ ما نوى»",
        "«من سلك طريقاً يلتمس فيه علماً سهل الله له به طريقاً إلى الجنة»",
        "«كلمتان خفيفتان على اللسان، ثقيلتان في الميزان: سبحان الله وبحمده، سبحان الله العظيم»",
        "«لا يؤمن أحدكم حتى يحب لأخيه ما يحب لنفسه»",
        "«اتق الله حيثما كنت، وأتبع السيئة الحسنة تمحها»",
        "«تبسمك في وجه أخيك لك صدقة»"
    ];

    function enableAudio() {
        const adhan = document.getElementById("adhanAudio");
        adhan.play().then(() => { adhan.pause(); adhan.currentTime = 0; });
        if ("Notification" in window) Notification.requestPermission();
        alert("تم تفعيل التنبيهات للنسخة " + APP_VERSION);
    }

    function setDailyHadith() {
        const today = new Date();
        const dayOfYear = Math.floor((today - new Date(today.getFullYear(), 0, 0)) / 86400000);
        const index = dayOfYear % hadiths.length;
        document.getElementById("hadithText").innerText = hadiths[index];
    }

    async function loadTimes() {
        try {
            const res = await fetch(`https://api.aladhan.com/v1/timingsByCity?city=Cairo&country=Egypt&method=5&v=${APP_VERSION}`);
            const data = await res.json();
            timings = data.data.timings;
            renderPrayers();
            setDailyHadith();
            setInterval(updateCountdown, 1000);
        } catch (error) {
            document.getElementById("nextPrayer").innerText = "خطأ في الاتصال";
        }
    }

    function renderPrayers() {
        const container = document.getElementById("prayerList");
        container.innerHTML = "";
        Object.keys(names).forEach(key => {
            container.innerHTML += `
                <div class="card" id="card-${key}">
                    <span style="font-weight: bold;">${names[key]}</span>
                    <span>${timings[key]}</span>
                </div>`;
        });
    }

    function updateCountdown() {
        const now = new Date();
        let minDiff = Infinity;
        let upcoming = "";

        Object.keys(names).forEach(key => {
            const [hrs, mins] = timings[key].split(":");
            let pDate = new Date();
            pDate.setHours(hrs, mins, 0);
            if (pDate < now) pDate.setDate(pDate.getDate() + 1);
            const diff = pDate - now;
            
            document.getElementById(`card-${key}`).classList.remove("active");
            if (diff < minDiff) { 
                minDiff = diff; 
                upcoming = key; 
            }
        });

        const activeCard = document.getElementById(`card-${upcoming}`);
        if(activeCard) activeCard.classList.add("active");
        document.getElementById("nextPrayer").innerText = "الصلاة القادمة: " + names[upcoming];

        const h = Math.floor(minDiff / 3600000);
        const m = Math.floor((minDiff % 3600000) / 60000);
        const s = Math.floor((minDiff % 60000) / 1000);
        document.getElementById("countdown").innerText = `${h.toString().padStart(2,"0")}:${m.toString().padStart(2,"0")}:${s.toString().padStart(2,"0")}`;

        if (h === 0 && m === 0 && s === 0) {
            document.getElementById("adhanAudio").play();
            if ("vibrate" in navigator) navigator.vibrate([1000, 500, 1000]);
        }
    }

    // تسجيل الـ Service Worker مع مسح الكاش عند تغيير النسخة
    if ("serviceWorker" in navigator) {
        navigator.serviceWorker.register(`service-worker.js?v=${APP_VERSION}`).then(reg => {
            reg.onupdatefound = () => {
                const installingWorker = reg.installing;
                installingWorker.onstatechange = () => {
                    if (installingWorker.state === 'installed' && navigator.serviceWorker.controller) {
                        // هناك تحديث جديد، نقوم بإعادة تحميل الصفحة
                        window.location.reload();
                    }
                };
            };
        });
    }
    
    loadTimes();
</script>
</body>
</html>
